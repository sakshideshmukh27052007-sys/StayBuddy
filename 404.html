{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div>
    <div style="font-size:5rem;margin-bottom:1rem;">😕</div>
    <h1 style="font-size:2.5rem;margin-bottom:.75rem;">{{ message or 'Page Not Found' }}</h1>
    <p style="color:var(--muted);margin-bottom:2rem;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">Go Home →</a>
  </div>
</div>
{% endblock %}
